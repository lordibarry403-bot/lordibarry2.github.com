<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion</title>
<style>
body{
    background:#202020;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login{
    background:#2f2f2f;
    padding:20px;
    border-radius:10px;
    width:300px;
    text-align:center;
}

input{
    width:90%;
    padding:10px;
    margin:8px;
}

button{
    padding:10px 20px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="login">
    <h2>Connexion</h2>

    <input type="text" id="user" placeholder="Nom d'utilisateur">

    <input type="password" id="code" placeholder="Code">

    <button onclick="connexion()">Se connecter</button>

    <p id="msg"></p>
</div>

<script>

const CODE_USER = "1234";
const CODE_ADMIN = "admin2026";

function connexion(){

    let user = document.getElementById("user").value;
    let code = document.getElementById("code").value;
    let msg = document.getElementById("msg");

    if(user == ""){
        msg.innerHTML = "Entre un nom d'utilisateur.";
        return;
    }

    if(code == CODE_USER){
        alert("Bienvenue " + user + " !");
        window.location.href="user.html";
    }
    else if(code == CODE_ADMIN){
        alert("Bienvenue Administrateur !");
        window.location.href="admin.html";
    }
    else{
        msg.innerHTML="Code incorrect.";
    }

}

</script>

</body>
</html>
